<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gridlet</title>
  <base href="%GRIDLET_BASE%/" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='1' y='1' width='6' height='6' rx='1.5' fill='%234f8cff'/%3E%3Crect x='9' y='1' width='6' height='6' rx='1.5' fill='%23566274'/%3E%3Crect x='1' y='9' width='6' height='6' rx='1.5' fill='%23566274'/%3E%3Crect x='9' y='9' width='6' height='6' rx='1.5' fill='%234f8cff'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand"><span class="brand-mark">▦</span>Gridlet</div>
      <label class="picker">Connection
        <select id="connection-select"></select>
      </label>
      <label class="picker">Database
        <select id="database-select"></select>
      </label>
      <button id="refresh-btn" class="ghost" title="Reload objects">⟳</button>
      <div class="spacer"></div>
      <button id="apis-btn" class="ghost" title="Published API endpoints">APIs</button>
      <button id="new-query-btn" class="primary" title="Open an ad-hoc SQL workspace">Query</button>
      <span id="version" class="muted"></span>
    </header>
    <div id="main">
      <aside id="sidebar">
        <input id="search" type="search" placeholder="Filter objects…" autocomplete="off" />
        <div id="tree" class="tree"></div>
      </aside>
      <div id="sidebar-grip" role="separator" aria-label="Resize sidebar" aria-orientation="vertical" tabindex="0"></div>
      <section id="content">
        <div id="tabbar"></div>
        <div id="panels"></div>
        <div id="empty-state">
          <div class="empty-inner">
            <div class="empty-mark">▦</div>
            <p>Select a database object from the sidebar —<br />or open an ad-hoc SQL workspace.</p>
          </div>
        </div>
      </section>
    </div>
  </div>
  <div id="toast-stack" aria-live="polite" aria-atomic="false"></div>
  <script src="assets/app.js"></script>
</body>
</html>
